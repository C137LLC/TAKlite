name: TAKlite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run Python tests
        run: python3 -m unittest tests/test_access_control.py tests/test_bulk_users.py

      - name: Compile Python service
        run: python3 -m py_compile docker/taklite/taklite_service.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Validate compose config
        env:
          WG_BIND_IP: 10.66.66.1
          TAKLITE_ADMIN_TOKEN: ci-token
          TAKLITE_CERT_PASSWORD: atakatak
        run: docker compose config >/tmp/taklite-compose.yml

      - name: Build Docker image
        env:
          WG_BIND_IP: 10.66.66.1
          TAKLITE_ADMIN_TOKEN: ci-token
          TAKLITE_CERT_PASSWORD: atakatak
        run: docker compose build taklite
