services:
  taklite:
    build:
      context: .
      dockerfile: ./docker/taklite/Dockerfile
    container_name: taklite
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    user: "${TAKLITE_CONTAINER_USER:-10001:10001}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      TAKLITE_HTTP_BIND: "0.0.0.0"
      TAKLITE_HTTP_PORT: "8080"
      TAKLITE_HTTP_PUBLIC_PORT: "${TAKLITE_HTTP_HOST_PORT:-8080}"
      TAKLITE_HTTPS_BIND: "0.0.0.0"
      TAKLITE_HTTPS_PORT: "8443"
      TAKLITE_HTTPS_PUBLIC_PORT: "${TAKLITE_HTTPS_HOST_PORT:-8443}"
      TAKLITE_HTTPS_CERT: "/certs/taklite.crt"
      TAKLITE_HTTPS_KEY: "/certs/taklite.key"
      TAKLITE_CLIENT_CA: "/certs/taklite-ca.crt"
      TAKLITE_AUTO_INIT_CERTS: "${TAKLITE_AUTO_INIT_CERTS:-false}"
      TAKLITE_COT_BIND: "0.0.0.0"
      TAKLITE_COT_PORT: "58087"
      TAKLITE_COT_PUBLIC_PORT: "${TAKLITE_COT_HOST_PORT:-58087}"
      TAKLITE_COT_TLS_BIND: "0.0.0.0"
      TAKLITE_COT_TLS_PORT: "8089"
      TAKLITE_COT_TLS_PUBLIC_PORT: "${TAKLITE_COT_TLS_HOST_PORT:-8089}"
      TAKLITE_ADMIN_TOKEN: "${TAKLITE_ADMIN_TOKEN:?set TAKLITE_ADMIN_TOKEN in .env}"
      TAKLITE_PUBLIC_HOST: "${TAKLITE_PUBLIC_HOST:-10.66.66.1}"
      TAKLITE_SERVER_HOST: "${TAKLITE_SERVER_HOST:-10.66.66.1}"
      TAKLITE_CERT_PASSWORD: "${TAKLITE_CERT_PASSWORD:?set TAKLITE_CERT_PASSWORD in .env}"
      TAKLITE_DB: "/data/taklite.sqlite3"
      TAKLITE_PACKAGE_DIR: "/packages"
      TAKLITE_STATIC_DIR: "/app/static"
      TAKLITE_WGDASHBOARD_URL: "${TAKLITE_WGDASHBOARD_URL-http://10.66.66.1:10086}"
      TAKLITE_MAX_UPLOAD_BYTES: "${TAKLITE_MAX_UPLOAD_BYTES:-268435456}"
      TAKLITE_COT_TLS_REQUIRE_CLIENT_CERT: "${TAKLITE_COT_TLS_REQUIRE_CLIENT_CERT:-true}"
      TAKLITE_ALLOW_LEGACY_CLIENT_CERT: "${TAKLITE_ALLOW_LEGACY_CLIENT_CERT:-false}"
      TAKLITE_ACCESS_CONTROL_ENFORCE: "${TAKLITE_ACCESS_CONTROL_ENFORCE:-true}"
      TAKLITE_LEGACY_CERT_DOWNLOADS: "${TAKLITE_LEGACY_CERT_DOWNLOADS:-false}"
      TAKLITE_SOCKET_SEND_TIMEOUT_SECONDS: "${TAKLITE_SOCKET_SEND_TIMEOUT_SECONDS:-2.5}"
      TAKLITE_GUI_UPDATE_ENABLED: "${TAKLITE_GUI_UPDATE_ENABLED:-false}"
      TAKLITE_GUI_UPDATE_COMMAND: "${TAKLITE_GUI_UPDATE_COMMAND:-}"
      TAKLITE_GUI_UPDATE_WORKDIR: "${TAKLITE_GUI_UPDATE_WORKDIR:-}"
      TAKLITE_GUI_UPDATE_TIMEOUT_SECONDS: "${TAKLITE_GUI_UPDATE_TIMEOUT_SECONDS:-900}"
      TAKLITE_GUI_UPDATE_REQUEST_DIR: "${TAKLITE_GUI_UPDATE_REQUEST_DIR:-}"
      TAKLITE_SETTINGS_REQUEST_DIR: "${TAKLITE_SETTINGS_REQUEST_DIR:-}"
      TAKLITE_FIREWALL_REQUEST_DIR: "${TAKLITE_FIREWALL_REQUEST_DIR:-}"
      TAKLITE_WG_INTERFACE: "${TAKLITE_WG_INTERFACE:-wg0}"
      TAKLITE_PUBLIC_INTERFACE: "${TAKLITE_PUBLIC_INTERFACE:-}"
      TAKLITE_WIREGUARD_PORT: "${TAKLITE_WIREGUARD_PORT:-51820}"
      TAKLITE_WGDASHBOARD_PORT: "${TAKLITE_WGDASHBOARD_PORT:-10086}"
    volumes:
      - ./taklite/data:/data
      - ./taklite/packages:/packages
      - ./taklite/certs:/certs
    ports:
      - "${WG_BIND_IP:-10.66.66.1}:${TAKLITE_COT_HOST_PORT:-58087}:58087/tcp"
      - "${WG_BIND_IP:-10.66.66.1}:${TAKLITE_COT_TLS_HOST_PORT:-8089}:8089/tcp"
      - "${WG_BIND_IP:-10.66.66.1}:${TAKLITE_HTTP_HOST_PORT:-8080}:8080/tcp"
      - "${WG_BIND_IP:-10.66.66.1}:${TAKLITE_HTTPS_HOST_PORT:-8443}:8443/tcp"
